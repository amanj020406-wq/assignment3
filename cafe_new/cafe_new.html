<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe</title>
    <link rel="stylesheet" href="caf_nw.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="logo.png">
        </div>
        <div>
            <h1> Coffee Corner Cafe</h1>
        </div>

        <div class="menu-links">
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
        </div>

    </nav>


    <div class="carousel-container">
        <div class="hero">
            <h2 style="color: rgb(197, 93, 8);">Welcome to Coffee Corner</h2>
            <p>Best coffee in town since 2010</p>
        </div>


        <div id="carouselExampleFade" class="carousel slide carousel-fade">
            <div class="carousel-inner">
                <div class="carousel-item active">
                <img src="https://plus.unsplash.com/premium_photo-1674327105076-36c4419864cf?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8aWNlZCUyMGNvZmZlZXxlbnwwfHwwfHx8MA%3D%3D" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                <img src="https://marketplace.canva.com/tEtTE/MAFoAStEtTE/1/tl/canva-people-hands-holding-coffee-cups-MAFoAStEtTE.jpg" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                <img src="https://media.istockphoto.com/id/1859646927/photo/closeup-image-of-a-man-and-a-woman-clinking-white-coffee-mugs-in-cafe.webp?b=1&s=612x612&w=0&k=20&c=65GrpOlHHFI6xclmLItHEvIxTP3TlLIKrbcWDaEPjng=" class="d-block w-100" alt="...">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleFade" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>


</body>
</html>
